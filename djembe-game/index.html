<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#4ECDC4" />
  <meta name="description" content="서아프리카 전통 타악기 젬베를 모티브로 한 모바일 웹 친화적 리듬 게임" />
  <title>젬베 리듬 게임</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/images/djembe-icon.png" />
  <link rel="icon" type="image/png" href="assets/images/djembe-icon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0F0F1E;
      color: #fff;
      font-family: 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      overscroll-behavior: none;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
      height: 100dvh;
    }
    #game {
      display: block;
      width: 100%; height: 100%;
      touch-action: none;
      image-rendering: -webkit-optimize-contrast;
    }
    #splash {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0F0F1E, #1A1A2E);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease-out;
    }
    #splash h1 {
      font-size: 36px;
      background: linear-gradient(180deg, #4ECDC4, #FFD93D);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    #splash p {
      color: #B8B8D1;
      font-size: 14px;
    }
    #splash .spinner {
      margin-top: 24px;
      width: 40px; height: 40px;
      border: 3px solid rgba(78,205,196,0.25);
      border-top-color: #4ECDC4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #rotate-prompt {
      position: fixed; inset: 0;
      background: #0F0F1E;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      z-index: 999;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    #rotate-prompt.show { display: flex; }
    #rotate-prompt .icon { font-size: 64px; margin-bottom: 16px; animation: rotate-hint 2s ease-in-out infinite; }
    @keyframes rotate-hint { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }
    @media (orientation: portrait) and (max-width: 768px) and (max-height: 500px) {
      #rotate-prompt { display: flex; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="젬베 리듬 게임 게임 화면" tabindex="0"></canvas>
  <div id="splash" role="status" aria-live="polite">
    <h1>젬베 리듬</h1>
    <p>로딩 중...</p>
    <div class="spinner"></div>
  </div>
  <div id="rotate-prompt" aria-hidden="true">
    <div class="icon">📱</div>
    <h2 style="margin-bottom: 8px;">화면을 가로로 돌려주세요</h2>
    <p style="color: #B8B8D1;">최고의 경험을 위해 가로 모드를 사용해주세요</p>
  </div>
  <noscript>
    <div style="padding: 40px; color: #fff; text-align: center;">
      이 게임은 JavaScript가 필요합니다. 브라우저에서 JavaScript를 활성화해주세요.
    </div>
  </noscript>
  <script type="module" src="src/main.js"></script>
</body>
</html>
